      - "traefik.http.routers.roadcoin.entrypoints=websecure"
      - "traefik.http.routers.roadcoin.tls.certresolver=le"
      - "traefik.http.services.roadcoin.loadbalancer.server.port=80"
    restart: always

  roadchain:
    image: nginx:alpine
    volumes:
