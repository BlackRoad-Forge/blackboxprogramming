    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.corporate.rule=Host(`${INC_DOMAIN}`) || Host(`www.${INC_DOMAIN}`)"
      - "traefik.http.routers.corporate.entrypoints=websecure"
      - "traefik.http.routers.corporate.tls.certresolver=le"
      - "traefik.http.services.corporate.loadbalancer.server.port=80"
    restart: always

  roadcoin:
    image: nginx:alpine
    volumes:
