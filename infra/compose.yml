      - "traefik.http.routers.carpool.entrypoints=websecure"
      - "traefik.http.routers.carpool.tls.certresolver=le"
      - "traefik.http.services.carpool.loadbalancer.server.port=80"
    restart: always

  corporate:
    image: nginx:alpine
    volumes:
      - ./apps/corporate:/usr/share/nginx/html:ro
