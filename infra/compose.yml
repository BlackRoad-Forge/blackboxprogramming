    networks: [web]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.roadchain.rule=Host(`roadchain.${INC_DOMAIN}`)"
      - "traefik.http.routers.roadchain.entrypoints=websecure"
      - "traefik.http.routers.roadchain.tls.certresolver=le"
      - "traefik.http.services.roadchain.loadbalancer.server.port=80"
    restart: always

  vc:
    image: nginx:alpine
    volumes:
