name: Self-Healing Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Health
        id: health
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -n "$DEPLOY_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${DEPLOY_URL}/api/health" || echo "000")
            echo "status=$STATUS" >> "$GITHUB_OUTPUT"
            echo "Health check status: $STATUS"
          else
            echo "status=skip" >> "$GITHUB_OUTPUT"
            echo "No DEPLOY_URL configured, skipping health check"
          fi

      - name: Create Issue on Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const title = 'Deployment Health Check Failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-health'
            });
            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `Deployment health check failed.\n\n- **Status:** ${{ steps.health.outputs.status }}\n- **Workflow:** ${context.workflow}\n- **Run:** ${context.runId}\n- **Time:** ${new Date().toISOString()}`,
                labels: ['bug', 'deployment-health']
              });
            }
