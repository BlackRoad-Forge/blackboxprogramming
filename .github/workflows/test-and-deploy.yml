name: Test & Deploy to Pis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run all tests
        run: npm test

  deploy-pi:
    name: Deploy to Raspberry Pis
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PI_HOST_1 }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ secrets.PI_HOST_2 }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Pi cluster
        env:
          PI_USER: ${{ secrets.PI_USER || 'pi' }}
          PI_HOST_1: ${{ secrets.PI_HOST_1 }}
          PI_HOST_2: ${{ secrets.PI_HOST_2 }}
          PI_DEPLOY_PATH: /opt/blackroad/stripe-service
        run: bash deploy/pi/deploy.sh

  deploy-railway:
    name: Deploy to Railway (fallback)
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        run: railway up --service blackroad-stripe-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
