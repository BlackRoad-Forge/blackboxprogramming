name: 🌐 Org Integration

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      target_org:
        description: 'Specific org to sync (leave empty to sync all)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  sync-configs:
    name: Sync Configs to All Orgs
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        org:
          - BlackRoad-OS
          - BlackRoad-AI
          - BlackRoad-Cloud
          - BlackRoad-Security
          - BlackRoad-Labs
          - BlackRoad-Archive
          - BlackRoad-Education
          - BlackRoad-Foundation
          - BlackRoad-Gov
          - BlackRoad-Hardware
          - BlackRoad-Interactive
          - BlackRoad-Media
          - BlackRoad-Studio
          - BlackRoad-Ventures

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if targeting specific org
        if: github.event.inputs.target_org != '' && github.event.inputs.target_org != matrix.org
        run: echo "Skipping ${{ matrix.org }} – not the target org."

      - name: Sync GitHub config to ${{ matrix.org }}
        if: github.event.inputs.target_org == '' || github.event.inputs.target_org == matrix.org
        env:
          ORG: ${{ matrix.org }}
          GH_TOKEN: ${{ secrets.ORG_INTEGRATION_TOKEN }}
        run: |
          echo "🔄 Syncing integration configs to ${ORG}..."

          # Verify org is accessible
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${ORG}")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ ${ORG} is accessible"
          else
            echo "⚠️  ${ORG} returned HTTP ${HTTP_STATUS} – skipping"
          fi

  audit-org-repos:
    name: Audit Repo Settings
    runs-on: ubuntu-latest
    needs: sync-configs
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit all orgs
        env:
          GH_TOKEN: ${{ secrets.ORG_INTEGRATION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ORGS=(
            "BlackRoad-OS"
            "BlackRoad-AI"
            "BlackRoad-Cloud"
            "BlackRoad-Security"
            "BlackRoad-Labs"
            "BlackRoad-Archive"
            "BlackRoad-Education"
            "BlackRoad-Foundation"
            "BlackRoad-Gov"
            "BlackRoad-Hardware"
            "BlackRoad-Interactive"
            "BlackRoad-Media"
            "BlackRoad-Studio"
            "BlackRoad-Ventures"
          )

          echo "## 📊 Org Integration Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Organization | Status | Repos |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          for ORG in "${ORGS[@]}"; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/${ORG}")

            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Active' if 'login' in d else '❌ Inaccessible')" 2>/dev/null || echo "❌ Error")
            REPOS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('public_repos',0))" 2>/dev/null || echo "N/A")

            echo "| ${ORG} | ${STATUS} | ${REPOS} |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Generated at: $(date -u '+%Y-%m-%d %H:%M UTC')_" >> $GITHUB_STEP_SUMMARY
