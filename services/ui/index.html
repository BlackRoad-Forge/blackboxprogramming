<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PS-SHA∞ Chat</title>
<style>
body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
textarea { width: 100%; height: 100px; }
#response { white-space: pre-wrap; margin-top: 1rem; background: #f8f8f8; padding: 1rem; border-radius: 4px; }
</style>
</head>
<body>
<h1>PS-SHA∞ Chat</h1>
<label>API Base URL:
<input id="baseUrl" type="text" value="/" /></label><br/>
<label>Bearer Token:
<input id="token" type="text" placeholder="your token" /></label><br/><br/>
<textarea id="message" placeholder="Enter your message"></textarea><br/>
<button id="sendBtn">Send</button>
<div id="response"></div>
<script>
document.getElementById('sendBtn').addEventListener('click', async function() {
  const baseUrl = document.getElementById('baseUrl').value || '/';
  const token = document.getElementById('token').value.trim();
  const message = document.getElementById('message').value;
  if(!message) return;
  const body = { message: message, context: {}, breath: 0 };
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  try {
    const response = await fetch(baseUrl.replace(/\/$/, '') + '/chat-bind', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(body)
    });
    const data = await response.json();
    document.getElementById('response').textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById('response').textContent = 'Error: ' + err;
  }
});
</script>
</body>
</html>
