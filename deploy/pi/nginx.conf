# BlackRoad Stripe Service — Nginx reverse proxy
# Route external HTTPS traffic to the local Node.js service on the Pi.
#
# Install: sudo cp this /etc/nginx/sites-available/blackroad-stripe
#          sudo ln -s /etc/nginx/sites-available/blackroad-stripe /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream stripe_backend {
    # Primary Pi
    server 127.0.0.1:3000;
    # Add second Pi for load balancing:
    # server blackroad-pi.local:3000 backup;
}

server {
    listen 80;
    server_name stripe.blackroad.systems stripe.blackroad.local;

    # Redirect HTTP → HTTPS in production
    # Uncomment when SSL is configured:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://stripe_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (no auth)
    location /api/health {
        proxy_pass http://stripe_backend;
        proxy_set_header Host $host;
    }

    # Stripe webhook — preserve raw body
    location /api/stripe/webhook {
        proxy_pass http://stripe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Stripe-Signature $http_stripe_signature;
        proxy_request_buffering off;
    }
}
